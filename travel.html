<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel — Eric Bochsler</title>
    <meta name="description" content="City ratings, travel log, and spider charts from Eric Bochsler's adventures around the world.">
    <link rel="canonical" href="https://bochsler.org/travel.html">
    <meta property="og:title" content="Travel — Eric Bochsler">
    <meta property="og:description" content="City ratings, travel log, and spider charts from Eric Bochsler's adventures around the world.">
    <meta property="og:url" content="https://bochsler.org/travel.html">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Animated background canvas -->
    <canvas id="bg-canvas" aria-hidden="true"></canvas>

    <!-- Header / Nav -->
    <header class="header" id="header">
        <div class="header-inner">
            <a href="index.html" class="logo">Eric Bochsler</a>
            <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="nav" id="nav">
                <a href="index.html#about" class="nav-link">About</a>
                <a href="index.html#projects" class="nav-link">Projects</a>
                <a href="index.html#resume" class="nav-link">Resume</a>
                <div class="mode-toggle">
                    <a href="index.html" class="mode-btn" aria-label="Work" title="Work">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="4" x2="4" y2="20"/><line x1="4" y1="20" x2="20" y2="20"/><rect class="chart-bar bar-1" x="7" y="14" width="3" height="6" rx="0.5" fill="currentColor" stroke="none"/><rect class="chart-bar bar-2" x="11" y="9" width="3" height="11" rx="0.5" fill="currentColor" stroke="none"/><rect class="chart-bar bar-3" x="15" y="5" width="3" height="15" rx="0.5" fill="currentColor" stroke="none"/></svg>
                    </a>
                    <a href="running.html" class="mode-btn" aria-label="Run" title="Run">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><g class="runner-figure"><circle cx="14" cy="3.5" r="2" fill="currentColor" stroke="none"/><path d="M13.5 5.5L11 12"/><path d="M12.5 7.5L8 10"/><path d="M12.5 7.5L15 9.5L16 7"/><path d="M11 12L7 17L5 20.5"/><path d="M11 12L14.5 16L15.5 20"/></g></svg>
                    </a>
                    <a href="travel.html" class="mode-btn active" aria-label="Travel" title="Travel">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><g class="compass-needle"><polygon points="12,3.5 13.5,11 12,10 10.5,11" fill="currentColor" stroke="none" opacity="0.85"/><polygon points="12,20.5 13.5,13 12,14 10.5,13" fill="currentColor" stroke="none" opacity="0.35"/></g><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/></svg>
                    </a>
                </div>
                <a href="https://www.linkedin.com/in/eric-bochsler-14298a109/" class="nav-link" target="_blank" rel="noopener noreferrer">LinkedIn &#8599;</a>
            </nav>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
                <svg class="theme-icon sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="theme-icon moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </header>

    <!-- Travel Hero -->
    <section class="running-hero" id="travel-hero">
        <div class="container">
            <p class="hero-greeting mono">// city log</p>
            <h1 class="running-hero-title">Travel</h1>
            <p class="running-hero-month mono" id="travel-subtitle">Loading...</p>
        </div>
    </section>

    <!-- Section 01: Overview -->
    <section class="section" id="overview">
        <div class="container">
            <h2 class="section-heading">
                <span class="section-number mono">01.</span> Overview
            </h2>

            <!-- Stat Cards -->
            <div class="stat-cards fun-stat-cards" id="stat-cards">
                <div class="stat-card reveal">
                    <span class="stat-icon mono">&#127961;</span>
                    <span class="stat-value" id="stat-cities" data-target="0">0</span>
                    <span class="stat-unit">total</span>
                    <span class="stat-label">Cities</span>
                </div>
                <div class="stat-card reveal">
                    <span class="stat-icon mono">&#127758;</span>
                    <span class="stat-value" id="stat-countries" data-target="0">0</span>
                    <span class="stat-unit">total</span>
                    <span class="stat-label">Countries</span>
                </div>
                <div class="stat-card reveal">
                    <span class="stat-icon mono">&#127757;</span>
                    <span class="stat-value" id="stat-continents" data-target="0">0</span>
                    <span class="stat-unit">total</span>
                    <span class="stat-label">Continents</span>
                </div>
                <div class="stat-card reveal">
                    <span class="stat-icon mono">&#11088;</span>
                    <span class="stat-value" id="stat-avg" data-target="0">0</span>
                    <span class="stat-unit">/10</span>
                    <span class="stat-label">Avg Rating</span>
                </div>
            </div>

            <!-- City Map -->
            <div class="venue-map-container reveal">
                <div id="city-map"></div>
            </div>
        </div>
    </section>

    <!-- Section 02: City Ratings -->
    <section class="section" id="city-ratings">
        <div class="container">
            <h2 class="section-heading">
                <span class="section-number mono">02.</span> City Ratings
            </h2>

            <!-- Tier Filters -->
            <div class="tier-filters" id="tier-filters">
                <button class="tier-filter-btn active" data-tier="all">All</button>
                <button class="tier-filter-btn tier-s" data-tier="S">S</button>
                <button class="tier-filter-btn tier-a" data-tier="A">A</button>
                <button class="tier-filter-btn tier-b" data-tier="B">B</button>
                <button class="tier-filter-btn tier-c" data-tier="C">C</button>
                <button class="tier-filter-btn tier-d" data-tier="D">D</button>
            </div>

            <!-- City Cards Grid -->
            <div class="city-cards-grid" id="city-cards-grid"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer-inner">
            <div class="footer-links">
                <a href="https://www.linkedin.com/in/eric-bochsler-14298a109/" target="_blank" rel="noopener noreferrer" class="footer-link">LinkedIn &#8599;</a>
            </div>
            <p class="footer-tagline mono">Built with data &amp; code</p>
            <p class="footer-copy">&copy; 2026 Eric Bochsler. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="travel.js"></script>
</body>
</html>
